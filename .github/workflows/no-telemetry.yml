name: No Telemetry Proof

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  no-telemetry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Install mitmproxy
        run: pip install mitmproxy

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run no-telemetry test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_5
          target: default
          avd-name: test
          script: |
            # Start mitmproxy capture in background
            mkdir -p captures
            mitmdump -w captures/capture.flow --listen-port 8080 --ssl-insecure &
            MITM_PID=$!

            # Wait for mitmproxy to be ready
            sleep 5

            # Download the mitmproxy CA certificate from the host
            curl -s --retry 10 --retry-delay 1 http://127.0.0.1:8080/cert/pem -o /tmp/mitm.pem
            if [ ! -s /tmp/mitm.pem ]; then
              echo "ERROR: Could not download mitmproxy CA cert" >&2
              exit 1
            fi

            # Install the mitmproxy CA cert into the emulator system trust store
            CERT_HASH=$(openssl x509 -inform PEM -subject_hash_old -in /tmp/mitm.pem | head -1)
            adb root
            adb wait-for-device
            adb remount
            adb push /tmp/mitm.pem /system/etc/security/cacerts/${CERT_HASH}.0
            adb shell chmod 644 /system/etc/security/cacerts/${CERT_HASH}.0

            # Configure emulator to use mitmproxy as HTTP/HTTPS proxy
            adb shell settings put global http_proxy 10.0.2.2:8080

            # Reboot so the new system cert takes effect
            adb reboot
            adb wait-for-device
            sleep 15

            # Install the debug APK (x86_64 build for emulator)
            adb install app/build/outputs/apk/debug/app-x86_64-debug.apk

            # Launch with NO URL intent
            adb shell am start -n it.uliveto.browser/.MainActivity

            # Wait 30 seconds idle (cold start window — do not navigate)
            sleep 30

            # Stop mitmdump
            kill $MITM_PID || true
            sleep 2

            # Assert zero flows — exits non-zero if any flow was captured
            python3 scripts/assert-no-flows.py captures/capture.flow

      - name: Generate capture summary
        if: always()
        run: |
          python3 -c "
          from mitmproxy import io as mio
          from mitmproxy.http import HTTPFlow
          import sys
          flows = []
          try:
              with open('captures/capture.flow', 'rb') as f:
                  for flow in mio.FlowReader(f).stream():
                      if isinstance(flow, HTTPFlow):
                          flows.append(f'{flow.request.method} {flow.request.pretty_url}')
          except Exception as e:
              print(f'Error reading capture: {e}')
              sys.exit(0)
          print(f'Total flows: {len(flows)}')
          for f in flows:
              print(f'  {f}')
          " > captures/capture-summary.txt 2>&1 || echo "No captures file" > captures/capture-summary.txt
          cat captures/capture-summary.txt

      - name: Upload capture artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-proof
          path: |
            captures/capture.flow
            captures/capture-summary.txt
          retention-days: 90
